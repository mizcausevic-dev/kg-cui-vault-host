# k8s deployment manifest — kg-cui-vault-host scaffold
#
# SCAFFOLD. Production deployments require additional concerns NOT
# addressed here: NetworkPolicy isolating the pod from outbound egress,
# PodSecurityPolicy with read-only root filesystem, ServiceAccount
# with minimum-required RBAC, ResourceQuotas + LimitRanges per namespace,
# external secrets management (sealed-secrets or external-secrets-operator),
# OPA Gatekeeper policy enforcement on resource creation, and audit logging
# to a centralized SIEM. Consult your DCSA-approved IS-1 system security plan.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kg-cui-vault-host
  labels:
    app: kg-cui-vault-host
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kg-cui-vault-host
  template:
    metadata:
      labels:
        app: kg-cui-vault-host
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: vault-host
          image: kg-cui-vault-host:0.1.0
          ports:
            - containerPort: 7443
              name: https
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 7443
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 7443
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kg-cui-vault-host
spec:
  selector:
    app: kg-cui-vault-host
  ports:
    - port: 443
      targetPort: 7443
      name: https
  type: ClusterIP
